# fly.toml app configuration file generated for nabu-trader on 2026-07-03T17:04:32+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nabu-trader'
primary_region = 'sin'

[build]

[env]
  CHANNEL_USERNAME = 'YOUR_SIGNAL_CHANNEL'
  DATA_ROOT = '/data'
  NOTIFY_CHAT_ID = 'YOUR_CHAT_ID'
  PYTHONUNBUFFERED = '1'

[[mounts]]
  source = 'data_volume'
  destination = '/data'

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
