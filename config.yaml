# ─── Auto-Trade Configuration ──────────────────────────────────────────────────
# See PLAN.md for full documentation.

exchange:
  active: binance              # paper | binance | binance_testnet
  binance:
    api_key_env: BINANCE_API_KEY
    api_secret_env: BINANCE_API_SECRET
    testnet: false
    futures: true              # false = spot, true = USDⓈ-M futures
    recv_window: 5000

risk:
  max_position_size_usdt: 5
  max_concurrent_positions: 2
  risk_per_trade_percent: 10.0
  daily_loss_limit_percent: 30.0
  min_cooldown_minutes: 5
  min_notional_usdt: 5.0       # Binance minimum — scaled up to avoid rejection
  max_position_hold_hours: 48
  max_leverage: 50             # ceiling for dynamic leverage (low-balance friendly)
  margin_usage_pct: 80         # use up to 80% of balance as margin per trade

agent:
  confidence_threshold: 0.0
  auto_trade: true           # YOLO mode activated! 🚀
  allowed_pairs:
    - "*"                     # wildcard: allow any pair
  llm:
    api_url: "https://opencode.ai/zen/go/v1/chat/completions"
    model: "deepseek-v4-flash"
    api_key_env: OPENCODE_GO_API_KEY
    timeout: 30

monitoring:
  check_interval_seconds: 10
  health_check_port: 9090

# ─── API Bridge ──────────────────────────────────────────────────
# Secure HTTP API for Hermes ↔ Fly.io interaction.
# Port 9090 is already exposed by fly.toml [http_service].
api:
  enabled: true
  host: "0.0.0.0"
  port: 9090
  # API_KEY is loaded from environment (Fly.io secret)
  # Rate limiting: 30 req/min per IP (hardcoded in auth.py)

# ─── Webhook ─────────────────────────────────────────────────────
# Push trade events to a Hermes webhook endpoint.
# WEBHOOK_URL and WEBHOOK_HMAC_SECRET are loaded from environment.
webhook:
  url: ""                       # Set via env WEBHOOK_URL or config
  hmac_secret: ""               # Set via env WEBHOOK_HMAC_SECRET or config
